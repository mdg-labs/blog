name: Publish

# On push to main: if packages/blog/package.json version has no matching git tag yet,
# create v<version>, then publish @mdg-labs/blog to npm via trusted publishing (OIDC).
# Bump "version" in packages/blog/package.json before merging to main.
# npmjs.com: package → Settings → Trusted publishing → GitHub Actions → publish.yml

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 22.14
          registry-url: https://registry.npmjs.org
          scope: "@mdg-labs"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Resolve release version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/blog/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch tags
        run: git fetch --tags --force origin

      - name: Check whether release tag exists
        id: tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}"^{commit} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No tag for ${{ steps.version.outputs.version }} — will create tag and publish."
          fi

      - name: Create and push release tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Upgrade npm for trusted publishing
        if: steps.tag.outputs.exists == 'false'
        run: npm install -g npm@latest

      - name: Publish @mdg-labs/blog
        if: steps.tag.outputs.exists == 'false'
        working-directory: packages/blog
        run: npm publish --access public
